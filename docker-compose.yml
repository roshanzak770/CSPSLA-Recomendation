services:

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - redis
      - chromadb
      - libretranslate
    volumes:
      - ./backend:/app
      - ./chromadb:/app/chromadb
      - ./sla_docs:/app/sla_docs
      - ~/.cache/huggingface:/root/.cache/huggingface
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend/placeholder:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: cloudsla
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  libretranslate:
    image: libretranslate/libretranslate
    ports:
      - "5001:5000"
    restart: unless-stopped

  celery_worker:
    build: ./backend
    command: celery -A app.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
      - ./chromadb:/app/chromadb
      - ./sla_docs:/app/sla_docs
    restart: unless-stopped

  celery_beat:
    build: ./backend
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
