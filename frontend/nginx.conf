server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Max upload size — matches the 50 MB cap in the FastAPI /admin/upload route.
  # nginx defaults to 1 MB, which rejects most real SLA PDFs with 413 before
  # they ever reach the backend.
  client_max_body_size 50M;

  # Proxy API calls to the backend container
  location /api/ {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 120s;
    # Allow large uploads to stream through without buffering the whole body
    # into memory; relies on the per-route streaming reader on the FastAPI side.
    proxy_request_buffering off;
  }

  location /health {
    proxy_pass http://api:8000/health;
    proxy_set_header Host $host;
  }

  # SPA routing — serve index.html for all non-asset routes
  location / {
    try_files $uri $uri/ /index.html;
  }
}
